services:
  # Dev environment - mount source for interactive development
  dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    volumes:
      - .:/phicoin
      - .cache:/cache
    environment:
      - DEBIAN_FRONTEND=noninteractive
    stdin_open: true
    tty: true

  # Runtime daemon - runs phicoind
  # NOTE: RPC port inside container is 28969 (from phicoin.conf),
  # mapped to 28966 on the host for the expected RPC endpoint.
  daemon:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "28964:28964"
      - "28966:28969"
    volumes:
      - ./.cache/data:/var/lib/phicoin
    command: >
      /bin/sh -c "
        phicoind -printtoconsole -daemon=0 -datadir=/var/lib/phicoin -rpcbind=0.0.0.0 -rpcallowip=0.0.0.0/0 -rpcport=28969
      "
